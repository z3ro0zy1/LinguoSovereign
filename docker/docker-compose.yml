version: "3.8"

services:
  # ----------------- 服务一：PostgreSQL 数据库 -----------------
  db:
    image: postgres:15-alpine
    container_name: linguo-postgres
    restart: always
    environment:
      POSTGRES_USER: linguo
      POSTGRES_PASSWORD: linguo_secure_password
      POSTGRES_DB: linguosovereign
    ports:
      - "5432:5432" # 如果想连数据库管理工具，可以暴露这个端口
    volumes:
      # 持久化数据库数据，即使删了重启 Docker 数据还在！
      - db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U linguo -d linguosovereign"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ----------------- 服务二：你的 Next.js 应用 -----------------
  app:
    container_name: linguo-app
    # 注意：这里的 build context 是指向上级目录 (即你的项目根目录)
    build:
      context: ../
      dockerfile: docker/Dockerfile
    restart: always
    ports:
      - "3000:3000"
    depends_on:
      db:
        condition: service_healthy # 必须等数据库准备好，应用才启动！
    environment:
      # 在 Docker 里的网络，应用连接数据库要用服务名 (即 db)，而不是 localhost！
      DATABASE_URL: "postgresql://linguo:linguo_secure_password@db:5432/linguosovereign?schema=public"
      # 你可以在这里粘贴你的各种 API Key，或者新建一个 .env 结合使用 env_file 设置
      NEXTAUTH_SECRET: "wg0T5tjm8AlWiGCADF7fy+esI4D8AJiQ+cl0ePR63u0="
      NEXTAUTH_URL: "http://localhost:3000"
      OPENAI_API_KEY: "sk-your-openai-key"
      GEMINI_API_KEY: "AIzaSy-your-gemini-key"
    volumes:
      # ✅ 这里的挂载完美解决了 1.8GB 大文件的问题！
      # 我们将宿主机（你的电脑）里的 public/Cambridge IELTS_Listening* 直接链接进 docker 容器的相应位置
      # 这样 Docker 镜像体积非常小，却依然能访问你硬盘上庞大的音频。
      - ../public:/app/public

# 声明持久化卷
volumes:
  db-data:

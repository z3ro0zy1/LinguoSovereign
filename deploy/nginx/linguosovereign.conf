# LinguoSovereign Nginx reverse proxy example
#
# 用途：
# 1. 对外监听 80 / 443
# 2. 把请求转发给本机 3000 端口上的 Next.js 生产服务
# 3. 处理 HTTPS、压缩、缓存、上传大小限制、WebSocket 升级
#
# 使用前必须替换：
# - example.com
# - /etc/letsencrypt/live/example.com/... 证书路径
#
# 假设：
# - `npm run build && npm run start -- --hostname 127.0.0.1 --port 3000`
# - 项目运行在同一台服务器

map $http_upgrade $connection_upgrade {
    default upgrade;
    '' close;
}

# 简单限流：限制高成本 API 的突发请求
# 如果后面发现太严格，可以先调大 rate / burst。
limit_req_zone $binary_remote_addr zone=api_limit:10m rate=10r/s;

server {
    listen 80;
    listen [::]:80;
    server_name example.com www.example.com;

    # 生产环境通常会把所有 http 请求跳到 https。
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name example.com www.example.com;

    # 证书路径：这里默认使用 certbot / Let's Encrypt
    ssl_certificate     /etc/letsencrypt/live/example.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/example.com/privkey.pem;

    ssl_session_timeout 1d;
    ssl_session_cache shared:SSL:10m;
    ssl_session_tickets off;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;

    # 安全响应头：先给基础版，不做过度激进配置。
    add_header X-Frame-Options SAMEORIGIN always;
    add_header X-Content-Type-Options nosniff always;
    add_header Referrer-Policy strict-origin-when-cross-origin always;

    # 头像上传等接口需要一定的请求体空间。
    client_max_body_size 10m;

    # 反向代理到 Next.js 应用
    set $app_upstream http://127.0.0.1:3000;

    # Next.js 静态资源缓存
    location /_next/static/ {
        proxy_pass $app_upstream;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # 用户头像等上传资源：项目当前存在 public/uploads
    location /uploads/ {
        proxy_pass $app_upstream;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        expires 7d;
        add_header Cache-Control "public, max-age=604800";
    }

    # 高成本 API：增加一层基础限流
    location ~ ^/api/(speaking/live|eval/subjective|reading/analysis) {
        limit_req zone=api_limit burst=20 nodelay;

        proxy_pass $app_upstream;
        proxy_http_version 1.1;
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # WebSocket / 长连接升级头
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
    }

    # 其他所有请求都转发给 Next.js
    location / {
        proxy_pass $app_upstream;
        proxy_http_version 1.1;
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
    }
}
